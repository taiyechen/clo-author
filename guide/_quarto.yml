project:
  type: website
  output-dir: ../docs

website:
  title: "The Clo-Author"
  navbar:
    left:
      - text: "Quick Start"
        href: index.qmd
      - text: "User Guide"
        href: user-guide.qmd
      - text: "Agents"
        href: agents.qmd
      - text: "Architecture"
        href: architecture.qmd
      - text: "Customization"
        href: customization.qmd
      - text: "Reference"
        href: reference.qmd
      - text: "What's New"
        href: changelog.qmd
    right:
      - icon: github
        href: https://github.com/hugosantanna/clo-author
  page-footer:
    center: "Built with [Quarto](https://quarto.org)"

format:
  html:
    theme:
      light:
        - cosmo
        - custom.scss
      dark:
        - darkly
        - custom-dark.scss
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    smooth-scroll: true
    mermaid:
      theme: neutral
